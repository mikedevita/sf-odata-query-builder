name: Build Electron App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: release/*.exe

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron and electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: node scripts/generate-icons.js

      - name: Set version from tag
        shell: bash
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run electron:build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      - name: Notify success
        if: success()
        run: |
          curl -s \
            --form-string "token=${{ secrets.PUSHOVER_API_TOKEN }}" \
            --form-string "user=${{ secrets.PUSHOVER_USER_KEY }}" \
            --form-string "title=✅ Build succeeded: ${{ github.ref_name }}" \
            --form-string "message=SAP SFEC Browser ${{ github.ref_name }} built and published successfully." \
            --form-string "url=https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" \
            --form-string "url_title=View release" \
            https://api.pushover.net/1/messages.json

      - name: Notify failure
        if: failure()
        run: |
          curl -s \
            --form-string "token=${{ secrets.PUSHOVER_API_TOKEN }}" \
            --form-string "user=${{ secrets.PUSHOVER_USER_KEY }}" \
            --form-string "title=❌ Build failed: ${{ github.ref_name }}" \
            --form-string "message=SAP SFEC Browser ${{ github.ref_name }} build failed. Check the Actions log for details." \
            --form-string "url=https://github.com/${{ github.repository }}/actions" \
            --form-string "url_title=View logs" \
            --form-string "priority=1" \
            https://api.pushover.net/1/messages.json

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
